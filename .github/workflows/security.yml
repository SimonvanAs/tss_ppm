# Security scanning workflow
# Runs npm audit on push, PR, and weekly schedule

name: Security Audit

on:
  push:
    branches: [master, main]
    paths:
      - 'hr-performance-app/package*.json'
      - '.github/workflows/security.yml'
  pull_request:
    branches: [master, main]
    paths:
      - 'hr-performance-app/package*.json'
  schedule:
    # Run every Sunday at 6:00 AM UTC to catch new CVEs
    - cron: '0 6 * * 0'
  workflow_dispatch: # Allow manual trigger

jobs:
  npm-audit:
    name: NPM Security Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hr-performance-app

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: hr-performance-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=moderate
        continue-on-error: true
        id: audit

      - name: Run npm audit (JSON output)
        run: npm audit --json > audit-report.json || true
        id: audit-json

      - name: Check for high/critical vulnerabilities
        run: |
          HIGH_VULN=$(npm audit --json 2>/dev/null | jq '.metadata.vulnerabilities.high // 0')
          CRITICAL_VULN=$(npm audit --json 2>/dev/null | jq '.metadata.vulnerabilities.critical // 0')

          echo "High vulnerabilities: $HIGH_VULN"
          echo "Critical vulnerabilities: $CRITICAL_VULN"

          if [ "$CRITICAL_VULN" -gt 0 ]; then
            echo "::error::Critical vulnerabilities found!"
            exit 1
          fi

          if [ "$HIGH_VULN" -gt 0 ]; then
            echo "::warning::High severity vulnerabilities found"
          fi

      - name: Upload audit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: npm-audit-report
          path: hr-performance-app/audit-report.json
          retention-days: 30

  # Check for known vulnerabilities in dependencies using GitHub's advisory database
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          deny-licenses: GPL-3.0, AGPL-3.0
          allow-licenses: MIT, Apache-2.0, BSD-2-Clause, BSD-3-Clause, ISC, 0BSD

  # Weekly full audit with detailed reporting
  weekly-report:
    name: Weekly Security Report
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    defaults:
      run:
        working-directory: hr-performance-app

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: hr-performance-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate detailed audit report
        run: |
          echo "# Weekly Security Audit Report" > security-report.md
          echo "Generated: $(date -u)" >> security-report.md
          echo "" >> security-report.md
          echo "## NPM Audit Results" >> security-report.md
          echo '```' >> security-report.md
          npm audit 2>&1 >> security-report.md || true
          echo '```' >> security-report.md
          echo "" >> security-report.md
          echo "## Outdated Packages" >> security-report.md
          echo '```' >> security-report.md
          npm outdated 2>&1 >> security-report.md || true
          echo '```' >> security-report.md

      - name: Upload weekly report
        uses: actions/upload-artifact@v4
        with:
          name: weekly-security-report-${{ github.run_number }}
          path: hr-performance-app/security-report.md
          retention-days: 90

      - name: Check for critical issues
        run: |
          CRITICAL=$(npm audit --json 2>/dev/null | jq '.metadata.vulnerabilities.critical // 0')
          if [ "$CRITICAL" -gt 0 ]; then
            echo "::error::Critical vulnerabilities detected in weekly scan!"
            exit 1
          fi
