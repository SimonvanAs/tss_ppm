name: Build Docker Images

on:
  # Manual trigger with options
  workflow_dispatch:
    inputs:
      push_images:
        description: 'Push images to GitHub Container Registry'
        required: false
        default: false
        type: boolean
      build_frontend:
        description: 'Build frontend image'
        required: false
        default: true
        type: boolean
      build_whisper:
        description: 'Build whisper image'
        required: false
        default: true
        type: boolean

  # Optional: Auto-build on push to master
  # push:
  #   branches: [master]
  #   paths:
  #     - 'Dockerfile.*'
  #     - 'hr-performance-app/**'
  #     - 'nginx.conf'

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/tss-ppm

jobs:
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.build_frontend }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.push_images }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.frontend
          push: ${{ github.event_name != 'workflow_dispatch' || inputs.push_images }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image built successfully
        run: echo "Frontend image built successfully"

  build-whisper:
    name: Build Whisper Server
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.build_whisper }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.push_images }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-whisper
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build whisper image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.whisper
          push: ${{ github.event_name != 'workflow_dispatch' || inputs.push_images }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image built successfully
        run: echo "Whisper server image built successfully"
