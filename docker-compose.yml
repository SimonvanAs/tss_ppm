# TSS PPM - Multi-tenant Performance Review System
# Docker Compose configuration for all services
#
# This setup exposes services on localhost ports for use with an external
# reverse proxy (Nginx, Traefik, etc.). See nginx.conf.example for sample config.

services:
  # ============================================
  # FRONTEND (React SPA)
  # ============================================
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3080:80"
    networks:
      - tss-ppm
    depends_on:
      - api
    environment:
      - VITE_API_URL=/api/v1
      - VITE_KEYCLOAK_URL=/auth
      - VITE_KEYCLOAK_REALM=tss-ppm
      - VITE_KEYCLOAK_CLIENT_ID=tss-ppm-frontend

  # ============================================
  # BACKEND API (Fastify + Prisma)
  # ============================================
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - tss-ppm
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started
    environment:
      - NODE_ENV=production
      - PORT=3000
      - LOG_LEVEL=info
      - DATABASE_URL=postgresql://ppm:${DB_PASSWORD:-changeme}@postgres:5432/tss_ppm
      - KEYCLOAK_URL=http://keycloak:8080
      - KEYCLOAK_REALM=tss-ppm
      - KEYCLOAK_CLIENT_ID=tss-ppm-api
      - CORS_ORIGINS=https://${DOMAIN:-localhost}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/v1/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ============================================
  # WHISPER (Speech-to-Text)
  # ============================================
  whisper:
    build:
      context: .
      dockerfile: Dockerfile.whisper
    restart: unless-stopped
    ports:
      - "127.0.0.1:3051:3001"
    networks:
      - tss-ppm
    volumes:
      - whisper-cache:/root/.cache/huggingface
    environment:
      - WHISPER_MODEL=small
      - WHISPER_COMPUTE_TYPE=int8
      - WHISPER_WORKERS=2
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G

  # ============================================
  # DATABASE (PostgreSQL)
  # ============================================
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    networks:
      - tss-ppm
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    environment:
      - POSTGRES_USER=ppm
      - POSTGRES_PASSWORD=${DB_PASSWORD:-changeme}
      - POSTGRES_DB=tss_ppm
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ppm -d tss_ppm"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Security: Don't expose port externally in production
    # Uncomment for local development:
    # ports:
    #   - "5432:5432"

  # ============================================
  # IDENTITY PROVIDER (Keycloak)
  # ============================================
  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    restart: unless-stopped
    command: start --db=postgres --proxy-headers=xforwarded --http-enabled=true --hostname-strict=false
    networks:
      - tss-ppm
    volumes:
      - keycloak-data:/opt/keycloak/data
      - ./keycloak:/opt/keycloak/data/import:ro
    environment:
      # Database (uses same PostgreSQL instance)
      - KC_DB=postgres
      - KC_DB_URL=jdbc:postgresql://postgres:5432/keycloak
      - KC_DB_USERNAME=ppm
      - KC_DB_PASSWORD=${DB_PASSWORD:-changeme}
      # Keycloak settings
      - KC_HOSTNAME=${DOMAIN:-localhost}
      - KC_HTTP_RELATIVE_PATH=/auth
      - KC_PROXY_HEADERS=xforwarded
      - KC_HTTP_ENABLED=true
      # Admin credentials
      - KEYCLOAK_ADMIN=${KC_ADMIN:-admin}
      - KEYCLOAK_ADMIN_PASSWORD=${KC_ADMIN_PASSWORD:-changeme}
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/9000 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '200 OK'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    depends_on:
      postgres:
        condition: service_healthy
    # Expose Keycloak for external reverse proxy
    ports:
      - "127.0.0.1:8180:8080"

networks:
  tss-ppm:
    driver: bridge

volumes:
  postgres-data:
  keycloak-data:
  whisper-cache:
