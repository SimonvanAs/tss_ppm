services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - frontend
    networks:
      - tss-ppm
    environment:
      - DOMAIN=${DOMAIN:-localhost}

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: unless-stopped
    networks:
      - tss-ppm
    depends_on:
      - whisper

  whisper:
    build:
      context: .
      dockerfile: Dockerfile.whisper
    restart: unless-stopped
    networks:
      - tss-ppm
    volumes:
      # Cache the model to avoid re-downloading
      - whisper-cache:/root/.cache/huggingface
    environment:
      - WHISPER_MODEL=small
      - WHISPER_COMPUTE_TYPE=int8
      - WHISPER_WORKERS=2
    # Resource limits (adjust based on VPS specs)
    deploy:
      resources:
        limits:
          memory: 3G
        reservations:
          memory: 1G
    # Optional: uncomment for GPU support (requires nvidia-docker)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

networks:
  tss-ppm:
    driver: bridge

volumes:
  whisper-cache:
  caddy-data:
  caddy-config:
