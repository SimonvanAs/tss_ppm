# Development overrides for docker-compose.yml
# This file is automatically loaded when running `docker compose up`
# For production, use: docker compose -f docker-compose.yml up

services:
  # Expose PostgreSQL for local development tools
  postgres:
    ports:
      - "5432:5432"

  # Expose Keycloak admin console
  keycloak:
    ports:
      - "8180:8080"
    volumes:
      - ./keycloak:/opt/keycloak/data/import:ro
    command: start-dev --import-realm
    environment:
      # Override for development mode
      - KC_PROXY=edge
      - KC_HTTP_ENABLED=true
      - KC_HOSTNAME=${DOMAIN:-localhost}
      - KC_HOSTNAME_PATH=/auth
      - KC_HTTP_RELATIVE_PATH=/auth

  # API with hot reload for development (if using nodemon)
  api:
    environment:
      - NODE_ENV=development
      - LOG_LEVEL=debug
    # Uncomment for local development with volume mount:
    # volumes:
    #   - ./api/src:/app/src:ro

  # Frontend with Vite dev server instead of nginx
  # Uncomment this section and comment out the main frontend for hot reload:
  # frontend:
  #   build:
  #     context: ./hr-performance-app
  #     dockerfile: Dockerfile.dev
  #   ports:
  #     - "5173:5173"
  #   volumes:
  #     - ./hr-performance-app/src:/app/src:ro
  #   environment:
  #     - VITE_API_URL=http://localhost/api/v1
  #     - VITE_KEYCLOAK_URL=http://localhost/auth
  #     - VITE_KEYCLOAK_REALM=tss-ppm
  #     - VITE_KEYCLOAK_CLIENT_ID=tss-ppm-frontend

  # Expose Whisper for debugging
  whisper:
    ports:
      - "3051:3001"
