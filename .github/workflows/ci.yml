name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: hr-performance-app/package-lock.json

      - name: Install dependencies
        working-directory: hr-performance-app
        run: npm ci

      - name: Run linter
        working-directory: hr-performance-app
        run: npm run lint

      - name: Run unit tests
        working-directory: hr-performance-app
        run: npm run test:run

      - name: Build application
        working-directory: hr-performance-app
        run: npm run build

  e2e:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: hr-performance-app/package-lock.json

      - name: Install dependencies
        working-directory: hr-performance-app
        run: npm ci

      - name: Install Playwright browsers
        working-directory: hr-performance-app
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: hr-performance-app
        run: npm run test:e2e -- --project=chromium

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: hr-performance-app/playwright-report/
          retention-days: 7
