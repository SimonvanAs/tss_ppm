name: Deploy to VPS

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:  # Allow manual trigger

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          # If you want port from secrets, just use the secret directly
          # or hardcode 22 if you always use 22:
          port: ${{ secrets.VPS_PORT }}
          script: |
            # Navigate to project directory (create if it doesn't exist)
            mkdir -p ~/tss_ppm
            cd ~/tss_ppm

            # Use REPO_URL secret if set, otherwise fall back to this repo URL
            REPO_URL="${{ secrets.REPO_URL }}"
            if [ -z "$REPO_URL" ]; then
              REPO_URL="https://github.com/${{ github.repository }}.git"
            fi

            # Pull latest code
            if [ -d ".git" ]; then
              git fetch origin
              # Try master first, then main
              git reset --hard origin/master || git reset --hard origin/main
            else
              git clone "$REPO_URL" .
            fi

            # Build and deploy with Docker Compose
            docker compose down || true   # modern syntax
            docker compose up -d --build

            # Clean up old images
            docker image prune -f

            echo "Deployment completed successfully!"
